<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <title>MediaPipe + ARKit Blendshape Model</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }

        video {
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: 180px;
            transform: scaleX(-1);
            opacity: .7;
        }

        .controls {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1;
            display: flex;
            gap: 8px;
        }

        button {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 6px;
            background: rgba(28, 28, 28, .82);
            color: #fff;
            font: 14px/1.2 system-ui, sans-serif;
            padding: 8px 12px;
            cursor: pointer;
        }

        button:hover {
            background: rgba(52, 52, 52, .9);
        }
    </style>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>

<body>
    <div class="controls">
        <button id="shuffleButton" type="button">Shuffle</button>
        <button id="resetButton" type="button">Reset</button>
    </div>
    <video id="video" autoplay playsinline muted></video>

    <script type="module">
        import * as THREE from "three";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import {
            FaceLandmarker,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

        const video = document.getElementById("video");
        const shuffleButton = document.getElementById("shuffleButton");
        const resetButton = document.getElementById("resetButton");
        const morphMeshes = [];
        let shuffledBlendshapeMap = null;
        let latestBlendshapeCategories = null;
        let shouldShuffleBlendshapes = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3));

        const gltf = await new GLTFLoader().loadAsync("./sample.glb");

        const model = gltf.scene;
        model.scale.setScalar(1.8);
        model.position.set(0, -1.1, 0);
        scene.add(model);

        model.traverse((o) => {
            if (o.isMesh && o.morphTargetDictionary && o.morphTargetInfluences) {
                morphMeshes.push(o);
            }
        });

        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );

        const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath:
                    "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1,
            outputFaceBlendshapes: true
        });

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;
        await video.play();

        function createShuffledBlendshapeMap(categories) {
            const sourceNames = categories.map((c) => c.categoryName);
            const targetNames = [...sourceNames];

            for (let i = targetNames.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * i);
                [targetNames[i], targetNames[j]] = [targetNames[j], targetNames[i]];
            }

            return Object.fromEntries(
                sourceNames.map((sourceName, i) => [sourceName, targetNames[i]])
            );
        }

        function applyBlendshapes(categories) {
            latestBlendshapeCategories = categories;

            if (shouldShuffleBlendshapes) {
                shuffledBlendshapeMap ??= createShuffledBlendshapeMap(categories);
            }

            for (const mesh of morphMeshes) {
                const dict = mesh.morphTargetDictionary;
                const influences = mesh.morphTargetInfluences;

                for (const c of categories) {
                    const targetName = shouldShuffleBlendshapes
                        ? shuffledBlendshapeMap[c.categoryName]
                        : c.categoryName;
                    const index = dict[targetName];

                    if (index !== undefined) {
                        influences[index] = THREE.MathUtils.lerp(
                            influences[index],
                            c.score,
                            0.45
                        );
                    }
                }
            }
        }

        shuffleButton.addEventListener("click", () => {
            shouldShuffleBlendshapes = true;
            if (latestBlendshapeCategories) {
                shuffledBlendshapeMap = createShuffledBlendshapeMap(latestBlendshapeCategories);
            } else {
                shuffledBlendshapeMap = null;
            }
        });

        resetButton.addEventListener("click", () => {
            shouldShuffleBlendshapes = false;
            shuffledBlendshapeMap = null;
        });

        function loop() {
            const result = faceLandmarker.detectForVideo(video, performance.now());
            const blendshapes = result.faceBlendshapes?.[0]?.categories;

            if (blendshapes) {
                applyBlendshapes(blendshapes);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }

        loop();

        addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
