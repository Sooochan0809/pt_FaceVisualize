<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion</title>
    <style>
        :root {
            --panel-bg: #1b2026e0;
            --accent: #42d392;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background: #f0f0f0;
            color: #f4f7fb;
            font-family: "Yu Gothic Medium", "Yu Gothic", sans-serif;
        }

        main {
            position: relative;
            width: min(100dvw, 75dvh);
            min-height: 100dvh;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        video,
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        video {
            object-fit: cover;
        }

        canvas {
            pointer-events: none;
        }

        .visualize {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #f0f0f0cc;
        }

        #vizCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .visualize[hidden] {
            display: none;
        }

        #out,
        #layerControls {
            padding: 12px;
            background: var(--panel-bg);
            border-radius: 8px;
            font: 0.85em "Yu Gothic Medium", "Yu Gothic", sans-serif;
            z-index: 10;
        }

        #out {
            position: absolute;
            right: 8px;
            bottom: 8px;
            margin: 0;
            font: 0.85em monospace;
        }

        #calibControls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5em;
            align-items: center;
            margin-bottom: 0.5em;
            min-width: 100%;
        }

        #toggleShapes {
            margin-left: auto;
        }

        #layerControls {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 999;
            display: flex;
            gap: 0.4em;
            align-items: center;
        }

        button {
            border: 1px solid #999;
            border-radius: 4px;
            padding: 0.35em 0.6em;
            background: #fff;
            color: #111;
            cursor: pointer;
            font: inherit;
            overflow-wrap: anywhere;
        }

        button:disabled {
            opacity: 0.55;
            cursor: wait;
        }

        #status {
            min-width: min(11em, 100%);
        }

        #shapesPanel[hidden] {
            display: none;
        }

        .shape {
            display: grid;
            grid-template-columns: 9em 7em 4em;
            gap: 0.5em;
            align-items: center;
        }

        .bar {
            position: relative;
            height: 0.9em;
            overflow: hidden;
            background: #ccc;
        }

        .bar::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 50%;
            width: 1px;
            background: #666;
        }

        .fill {
            position: absolute;
            top: 0;
            bottom: 0;
            width: var(--v);
            background: var(--accent);
        }

        .bar.raw::before {
            display: none;
        }

        .bar.raw .fill,
        .bar.positive .fill {
            left: 50%;
        }

        .bar.raw .fill {
            left: 0;
        }

        .bar.negative .fill {
            right: 50%;
            background: #c44;
        }

        .value {
            text-align: right;
        }
    </style>
</head>

<body>
    <main>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <section id="visualize_01" class="visualize" hidden>
            <canvas id="vizCanvas"></canvas>
        </section>
        <label id="layerControls">
            <input id="visualizeToggle" type="checkbox">
            <span>visualize_01</span>
        </label>
        <div id="out">
            <div id="calibControls">
                <button id="calibrate">キャリブ</button>
                <button id="clearBaseline">解除</button>
                <button id="toggleShapes" type="button" aria-expanded="true" aria-controls="shapesPanel">▲</button>
                <span id="status"></span>
            </div>
            <div id="shapesPanel"></div>
        </div>
    </main>
</body>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34";

    const $ = id => document.getElementById(id);
    const [video, canvas, vizCanvas, out, calibrate, clearBaseline, toggleShapes, status, shapesPanel, visualizeToggle, visualize] = ["video", "canvas", "vizCanvas", "out", "calibrate", "clearBaseline", "toggleShapes", "status", "shapesPanel", "visualizeToggle", "visualize_01"].map($);
    const ctx = canvas.getContext("2d");
    const vizCtx = vizCanvas.getContext("2d");
    const shapes = new Map();
    const spectrum = new Map();
    const base = new Map();
    const [WARMUP_FRAMES, CALIBRATION_FRAMES, DEADZONE] = [30, 120, 0.005];
    const calibration = { warmup: 0, remaining: 0, samples: 0, stats: new Map() };
    const [VW, VH] = [1280, 720];

    Object.assign(canvas, { width: 720, height: 960 });
    Object.assign(vizCanvas, { width: canvas.width, height: canvas.height });

    const faceLandmarker = await FaceLandmarker.createFromOptions(
        await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm"),
        {
            baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
            },
            runningMode: "VIDEO",
            numFaces: 1,
            outputFaceBlendshapes: true
        }
    );

    video.srcObject = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: VW }, height: { ideal: VH }, aspectRatio: { ideal: 16 / 9 } }
    });

    video.onloadeddata = () => requestAnimationFrame(loop);

    visualizeToggle.onchange = () => {
        visualize.hidden = !visualizeToggle.checked;
        if (visualizeToggle.checked) setShapesExpanded(false);
    };

    calibrate.onclick = () => {
        resetCalibration(WARMUP_FRAMES, CALIBRATION_FRAMES);
        calibrate.disabled = true;
    };

    clearBaseline.onclick = () => {
        resetCalibration();
        calibrate.disabled = false;
    };

    toggleShapes.onclick = () => {
        setShapesExpanded(shapesPanel.hidden);
    };

    function setShapesExpanded(expanded) {
        shapesPanel.hidden = !expanded;
        toggleShapes.setAttribute("aria-expanded", expanded);
        toggleShapes.textContent = `${expanded ? "▲" : "▼"}`;
    }

    function resetCalibration(warmup = 0, frames = 0) {
        base.clear();
        Object.assign(calibration, { warmup, remaining: frames, samples: 0 });
        calibration.stats.clear();
        status.textContent = "";
    }

    function loop() {
        const { faceLandmarks, faceBlendshapes } = faceLandmarker.detectForVideo(video, performance.now());
        const categories = faceBlendshapes[0]?.categories ?? [];
        draw(faceLandmarks[0]);
        updateShapes(categories);
        drawSpectrum(categories);
        requestAnimationFrame(loop);
    }

    function updateShapes(categories) {
        updateCalibration(categories);

        for (const { categoryName, score } of categories) {
            if (!shapes.has(categoryName)) {
                shapesPanel.insertAdjacentHTML("beforeend", `<div class="shape"><span>${categoryName}</span><span class="bar raw"><span class="fill"></span></span><span class="value"></span></div>`);
                shapes.set(categoryName, [...shapesPanel.lastElementChild.children].slice(1));
            }
            const [bar, value] = shapes.get(categoryName);
            const calibrated = base.size > 0;
            const displayScore = calibrated ? calibratedScore(categoryName, score) : score;
            const width = calibrated
                ? Math.min(Math.abs(displayScore) * 100, 50)
                : Math.min(score * 100, 100);
            bar.className = `bar ${calibrated ? (displayScore < 0 ? "negative" : "positive") : "raw"}`;
            bar.style.setProperty("--v", `${width}%`);
            value.textContent = calibrated ? signed(displayScore) : score.toFixed(4);
        }
    }

    function updateCalibration(categories) {
        if ((!calibration.warmup && !calibration.remaining) || !categories.length) return;

        if (calibration.warmup) {
            status.textContent = `準備中 ${--calibration.warmup}`;
            return;
        }

        for (const { categoryName, score } of categories) {
            const stat = calibration.stats.get(categoryName) ?? { sum: 0, sq: 0 };
            stat.sum += score;
            stat.sq += score * score;
            calibration.stats.set(categoryName, stat);
        }

        calibration.samples++;
        status.textContent = `キャリブレーション中 ${--calibration.remaining}`;

        if (calibration.remaining) return;

        base.clear();
        for (const [categoryName, { sum, sq }] of calibration.stats) {
            const mean = sum / calibration.samples;
            const variance = Math.max(sq / calibration.samples - mean * mean, 0);
            base.set(categoryName, { mean, dead: Math.max(Math.sqrt(variance) * 3, DEADZONE) });
        }
        calibrate.disabled = false;
        status.textContent = `キャリブ済み (${calibration.samples} frames)`;
    }

    function calibratedScore(categoryName, score) {
        const { mean = 0, dead = 0 } = base.get(categoryName) ?? {};
        const diff = score - mean;
        return Math.abs(diff) <= dead ? 0 : diff;
    }

    function signed(value) {
        return `${value >= 0 ? "+" : ""}${value.toFixed(4)}`;
    }

    function drawSpectrum(categories) {
        const { width, height } = vizCanvas;
        const [cx, cy] = [width / 2, height / 2];
        const baseRadius = Math.min(width, height) * 0.28;
        const maxSpike = Math.min(width, height) * 0.18;
        const calibrated = base.size > 0;
        const points = categories.map(({ categoryName, score }, i) => {
            const value = calibrated ? Math.abs(calibratedScore(categoryName, score)) : 0;
            const smoothed = (spectrum.get(categoryName) ?? 0) * 0.82 + value * 0.18;
            spectrum.set(categoryName, smoothed);
            const angle = i / categories.length * Math.PI * 2 - Math.PI / 2;
            const radius = baseRadius + Math.min(smoothed * 18, 1) * maxSpike;
            return {
                x: cx + Math.cos(angle) * radius,
                y: cy + Math.sin(angle) * radius
            };
        });

        vizCtx.clearRect(0, 0, width, height);
        vizCtx.fillStyle = "#f0f0f0cc";
        vizCtx.fillRect(0, 0, width, height);
        drawSpectrumPath(points, calibrated);
    }

    function drawSpectrumPath(points, active) {
        if (points.length < 3) return;

        vizCtx.save();
        vizCtx.lineWidth = active ? 6 : 3;
        vizCtx.lineJoin = "round";
        vizCtx.lineCap = "round";
        vizCtx.shadowColor = "#42d39299";
        vizCtx.shadowBlur = active ? 18 : 0;
        vizCtx.strokeStyle = active ? "#42d392" : "#789";
        vizCtx.beginPath();

        for (let i = 0; i < points.length; i++) {
            const current = points[i];
            const next = points[(i + 1) % points.length];
            const mid = {
                x: (current.x + next.x) / 2,
                y: (current.y + next.y) / 2
            };
            if (i === 0) {
                vizCtx.moveTo(mid.x, mid.y);
            } else {
                vizCtx.quadraticCurveTo(current.x, current.y, mid.x, mid.y);
            }
        }

        const first = points[0];
        const second = points[1];
        vizCtx.quadraticCurveTo(first.x, first.y, (first.x + second.x) / 2, (first.y + second.y) / 2);
        vizCtx.closePath();
        vizCtx.stroke();
        vizCtx.restore();
    }

    function draw(landmarks = []) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const [sw, sh] = [video.videoWidth || VW, video.videoHeight || VH];
        const scale = Math.max(canvas.width / sw, canvas.height / sh);
        const [dx, dy] = [(canvas.width - sw * scale) / 2, (canvas.height - sh * scale) / 2];

        ctx.fillStyle = "green";
        ctx.beginPath();
        for (const p of landmarks) {
            const [x, y] = [p.x * sw * scale + dx, p.y * sh * scale + dy];
            ctx.moveTo(x, y);
            ctx.arc(x, y, 1.2, 0, Math.PI * 2);
        }
        ctx.fill();
    }
</script>

</html>
