<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion</title>
    <style>
        :root {
            --panel-bg: #1b2026e0;
            --accent: #42d392;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background: #f0f0f0;
            color: #f4f7fb;
            font-family: "Yu Gothic Medium", "Yu Gothic", sans-serif;
        }

        main {
            position: relative;
            width: min(100dvw, 75dvh);
            min-height: 100dvh;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        video,
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        video {
            object-fit: cover;
        }

        video[hidden] {
            display: none;
        }

        main.file-source video {
            object-fit: contain;
        }

        canvas {
            pointer-events: none;
        }

        .visualize {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #f0f0f0c8;
        }

        .timelineControls {
            position: absolute;
            left: 50%;
            bottom: 14px;
            z-index: 3;
            display: grid;
            gap: 0.45em;
            width: min(320px, calc(100% - 28px));
            padding: 10px 12px;
            border-radius: 8px;
            background: #1b2026cc;
            color: #f4f7fb;
            font: 0.78em "Yu Gothic Medium", "Yu Gothic", sans-serif;
            transform: translateX(-50%);
            pointer-events: auto;
        }

        .timelineControls label {
            display: grid;
            grid-template-columns: 5.8em 1fr 4.2em;
            gap: 0.6em;
            align-items: center;
        }

        .timelineControls input {
            width: 100%;
            accent-color: var(--accent);
        }

        .timelineControls output {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        #calibrationGuide {
            position: absolute;
            inset: 0;
            z-index: 6;
            isolation: isolate;
            display: grid;
            place-items: center;
            pointer-events: none;
            text-align: center;
            font-weight: 500;
        }

        #calibrationGuide[hidden] {
            display: none;
        }

        #calibrationPoint {
            position: relative;
            z-index: 1;
            width: 42px;
            height: 42px;
            transform: rotate(-90deg);
        }

        #calibrationPointCenter {
            fill: #111;
        }

        #calibrationPointBase,
        #calibrationPointProgress {
            fill: none;
            stroke-width: 5;
        }

        #calibrationPointBase {
            stroke: #ffffffc9;
        }

        #calibrationPointProgress {
            stroke: var(--accent);
            stroke-dasharray: 100;
            stroke-dashoffset: calc(100 - var(--progress, 0));
            transition: stroke-dashoffset 0.12s linear;
        }

        #calibrationCard {
            position: absolute;
            z-index: 2;
            top: 50%;
            width: min(22em, 82%);
            color: #111;
            white-space: pre-line;
        }

        #out,
        #layerControls {
            padding: 12px;
            background: var(--panel-bg);
            border-radius: 8px;
            font: 0.85em "Yu Gothic Medium", "Yu Gothic", sans-serif;
            z-index: 10;
        }

        #out {
            position: absolute;
            right: 8px;
            bottom: 8px;
            font: 0.85em monospace;
        }

        #calibControls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5em;
            align-items: center;
            margin-bottom: 0.5em;
            min-width: 100%;
        }

        #toggleShapes {
            margin-left: auto;
        }

        #paramSetControls {
            display: flex;
            gap: 0.5em;
            margin-bottom: 0.6em;
        }

        #paramSetControls select {
            min-width: 9em;
            padding: 0.25em 0.35em;
            font: inherit;
            font-size: 0.85em;
        }

        .param {
            display: flex;
            gap: 0.35em;
            align-items: center;
            min-width: 0;
            font-size: 0.82em;
        }

        .param span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #layerControls {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            flex-direction: column;
            gap: 0.45em;
            align-items: flex-start;
        }

        #layerControls label {
            display: flex;
            gap: 0.4em;
            align-items: center;
        }

        #shuffleSpectrum,
        #viz2Tone,
        #viz3Tone {
            width: 100%;
            padding: 0.25em 0.4em;
            border-color: #777;
            font-size: 0.85em;
        }

        #sourceControls {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 999;
            display: grid;
            gap: 8px;
        }

        .timelineControls[hidden],
        #out[hidden],
        #layerControls[hidden],
        #sourceControls[hidden] {
            display: none;
        }

        #sourceControls input {
            position: absolute;
            inline-size: 1px;
            block-size: 1px;
            opacity: 0;
            pointer-events: none;
        }

        #sourceControls button,
        #sourceControls label {
            padding: 8px 10px;
            border: 0;
            border-radius: 8px;
            background: var(--panel-bg);
            color: #f4f7fb;
            font: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        button {
            border: 1px solid #999;
            border-radius: 4px;
            padding: 0.35em 0.6em;
            background: #fff;
            color: #111;
            cursor: pointer;
            font: inherit;
            overflow-wrap: anywhere;
        }

        button:disabled {
            opacity: 0.55;
            cursor: wait;
        }

        #status {
            min-width: min(11em, 100%);
        }

        .shape {
            display: grid;
            grid-template-columns: 9em 7em 4em;
            gap: 0.5em;
            align-items: center;
        }

        .bar {
            position: relative;
            height: 0.9em;
            overflow: hidden;
            background: #ccc;
        }

        .bar::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 50%;
            width: 1px;
            background: #666;
        }

        .fill {
            position: absolute;
            top: 0;
            bottom: 0;
            width: var(--v);
            background: var(--accent);
        }

        .bar.raw::before {
            display: none;
        }

        .bar.raw .fill,
        .bar.positive .fill {
            left: 50%;
        }

        .bar.raw .fill {
            left: 0;
        }

        .bar.negative .fill {
            right: 50%;
            background: #c44;
        }

        .value {
            text-align: right;
        }
    </style>
</head>

<body>
    <main id="stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <section id="visualize_01" class="visualize" hidden>
            <canvas id="vizCanvas"></canvas>
        </section>
        <section id="visualize_02" class="visualize" hidden>
            <canvas id="vizCanvas2"></canvas>
        </section>
        <section id="visualize_03" class="visualize" hidden>
            <canvas id="vizCanvas3"></canvas>
        </section>
        <section id="visualize_04" class="visualize" hidden>
            <canvas id="vizCanvas4"></canvas>
            <div class="timelineControls">
                <label>
                    <span>間隔</span>
                    <input id="viz4SnapshotInterval" type="range" min="10" max="600" step="10" value="10">
                    <output id="viz4SnapshotIntervalValue"></output>
                </label>
                <label>
                    <span>時間</span>
                    <input id="viz4HistoryLifetime" type="range" min="800" max="10000" step="100" value="5000">
                    <output id="viz4HistoryLifetimeValue"></output>
                </label>
            </div>
        </section>
        <section id="visualize_05" class="visualize" hidden>
            <canvas id="vizCanvas5"></canvas>
            <div class="timelineControls">
                <label>
                    <span>間隔</span>
                    <input id="viz5SnapshotInterval" type="range" min="10" max="600" step="10" value="80">
                    <output id="viz5SnapshotIntervalValue"></output>
                </label>
                <label>
                    <span>時間</span>
                    <input id="viz5HistoryLifetime" type="range" min="800" max="10000" step="100" value="2800">
                    <output id="viz5HistoryLifetimeValue"></output>
                </label>
            </div>
        </section>
        <div id="calibrationGuide" hidden>
            <svg id="calibrationPoint" viewBox="0 0 42 42" aria-hidden="true">
                <circle id="calibrationPointBase" cx="21" cy="21" r="12"></circle>
                <circle id="calibrationPointProgress" cx="21" cy="21" r="12" pathLength="100"></circle>
                <circle id="calibrationPointCenter" cx="21" cy="21" r="9.5"></circle>
            </svg>
            <div id="calibrationCard">
                <span id="calibrationGuideText"></span>
            </div>
        </div>
        <div id="layerControls">
            <label>
                <input id="visualizeToggle" type="checkbox">
                <span>visualize_01</span>
            </label>
            <button id="shuffleSpectrum" type="button" hidden>シャッフル</button>
            <label>
                <input id="visualizeToggle2" type="checkbox">
                <span>visualize_02</span>
            </label>
            <button id="viz2Tone" type="button" aria-pressed="false" hidden>カラー</button>
            <label>
                <input id="visualizeToggle3" type="checkbox">
                <span>visualize_03</span>
            </label>
            <button id="viz3Tone" type="button" aria-pressed="false" hidden>カラー</button>
            <label>
                <input id="visualizeToggle4" type="checkbox">
                <span>visualize_04</span>
            </label>
            <label>
                <input id="visualizeToggle5" type="checkbox">
                <span>visualize_05</span>
            </label>
        </div>
        <div id="sourceControls">
            <button id="cameraButton" type="button">WebCam</button>
            <label for="fileInput"><span>ファイルから</span>
                <input id="fileInput" type="file" accept="video/*">
            </label>
        </div>
        <div id="out">
            <div id="calibControls">
                <button id="calibrate">キャリブ</button>
                <button id="clearBaseline">解除</button>
                <button id="toggleShapes" type="button" aria-expanded="true" aria-controls="shapesPanel">▲</button>
                <span id="status"></span>
            </div>
            <div id="paramSetControls">
                <select id="paramSetSelect" aria-label="パラメーターセット"></select>
                <button id="saveParamSet" type="button">セット保存</button>
            </div>
            <div id="shapesPanel"></div>
        </div>
    </main>
</body>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34";
    import * as THREE from "../modules/three.js/three.module.min.js";

    const $ = id => document.getElementById(id);
    const ids = [
        "stage", "video", "canvas", "vizCanvas", "vizCanvas2", "vizCanvas3", "vizCanvas4", "vizCanvas5", "cameraButton", "fileInput",
        "calibrate", "clearBaseline", "toggleShapes", "status", "paramSetSelect", "saveParamSet", "shapesPanel", "layerControls", "sourceControls", "out",
        "visualizeToggle", "visualizeToggle2", "visualizeToggle3", "visualizeToggle4", "visualizeToggle5", "visualize_01", "visualize_02", "visualize_03", "visualize_04", "visualize_05", "calibrationGuide", "calibrationGuideText", "calibrationPoint", "shuffleSpectrum", "viz2Tone", "viz3Tone",
        "viz4SnapshotInterval", "viz4SnapshotIntervalValue", "viz4HistoryLifetime", "viz4HistoryLifetimeValue",
        "viz5SnapshotInterval", "viz5SnapshotIntervalValue", "viz5HistoryLifetime", "viz5HistoryLifetimeValue"
    ];
    const {
        stage, video, canvas, vizCanvas, vizCanvas2, vizCanvas3, vizCanvas4, vizCanvas5, cameraButton, fileInput,
        calibrate, clearBaseline, toggleShapes, status, paramSetSelect, saveParamSet, shapesPanel, layerControls, sourceControls, out,
        visualizeToggle, visualizeToggle2, visualizeToggle3, visualizeToggle4, visualizeToggle5, visualize_01: visualize, visualize_02: visualize2, visualize_03: visualize3, visualize_04: visualize4, visualize_05: visualize5,
        calibrationGuide, calibrationGuideText, calibrationPoint, shuffleSpectrum, viz2Tone, viz3Tone,
        viz4SnapshotInterval, viz4SnapshotIntervalValue, viz4HistoryLifetime, viz4HistoryLifetimeValue,
        viz5SnapshotInterval, viz5SnapshotIntervalValue, viz5HistoryLifetime, viz5HistoryLifetimeValue
    } = Object.fromEntries(ids.map(id => [id, $(id)]));
    const timelineControls = [...document.querySelectorAll(".timelineControls")];
    const ctx = canvas.getContext("2d");
    const vizCtx = vizCanvas.getContext("2d");
    const vizCtx2 = vizCanvas2.getContext("2d");
    const vizCtx5 = vizCanvas5.getContext("2d");
    const shapes = new Map();
    const enabledParams = new Set();
    const spectrum = new Map();
    const spectrumSharpness = new Map();
    const circles = new Map();
    const circleLayers = new Map();
    let spectrumOrder = [];
    let spectrumHistory = [];
    let spectrumLastSnapshotAt = 0;
    let viz5SnapshotIntervalMs = Number(viz5SnapshotInterval.value);
    let viz5HistoryLifetimeMs = Number(viz5HistoryLifetime.value);
    const PARAM_SET_DIR = "../parameter";
    const base = new Map();
    const [WARMUP_FRAMES, CALIBRATION_FRAMES, DEADZONE, SPECTRUM_ZERO_THRESHOLD, VIDEO_BASELINE_SECONDS, VIDEO_BASELINE_PASSES] = [20, 60, 0.005, 0.012, 0.2, 5];
    const [GUIDE_MESSAGE, WAIT_MESSAGE] = ["この点を見つめてください.", "顔を検出中です..."];
    const calibration = { warmup: 0, remaining: 0, samples: 0, stats: new Map() };
    const [VW, VH] = [1280, 720];
    let activeMode = "camera";
    let activeObjectUrl = "";
    let running = false;
    let loopToken = 0;
    let calibratingVideoFile = false;
    let viz2Monochrome = false;
    let viz3Monochrome = false;
    let paramSets = await loadParamSets();
    let activeParamSetName = "";

    Object.assign(canvas, { width: 720, height: 960 });
    for (const target of [vizCanvas, vizCanvas2, vizCanvas3, vizCanvas4, vizCanvas5]) {
        Object.assign(target, { width: canvas.width, height: canvas.height });
    }
    const [VIZ4_WIDTH, VIZ4_HEIGHT, VIZ4_DEPTH, VIZ4_BASE_Y, VIZ4_ROWS, VIZ4_COLUMNS] = [2.4, 0.86, 3.1, -0.3, 7, 7];
    const viz3 = setupViz3();
    const viz4 = setupViz4();
    let viz4History = [];
    let viz4LastSnapshotAt = 0;
    let viz4SnapshotIntervalMs = Number(viz4SnapshotInterval.value);
    let viz4HistoryLifetimeMs = Number(viz4HistoryLifetime.value);

    const faceLandmarker = await FaceLandmarker.createFromOptions(
        await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm"),
        {
            baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
            },
            runningMode: "VIDEO",
            numFaces: 1,
            outputFaceBlendshapes: true
        }
    );

    const report = message => error => {
        status.textContent = `${message}: ${error.message}`;
    };

    startCamera().catch(report("カメラを開始できません"));
    renderParamSetOptions();

    document.addEventListener("keydown", event => {
        if (event.key !== " " || event.repeat) return;
        const hidden = !layerControls.hidden;
        for (const panel of [layerControls, sourceControls, out, ...timelineControls]) {
            panel.hidden = hidden;
        }
    });

    for (const args of [[visualizeToggle, visualize, shuffleSpectrum], [visualizeToggle2, visualize2, viz2Tone], [visualizeToggle3, visualize3, viz3Tone], [visualizeToggle4, visualize4], [visualizeToggle5, visualize5]]) {
        args[0].onchange = () => toggleLayer(...args);
    }
    viz4SnapshotInterval.oninput = updateViz4Controls;
    viz4HistoryLifetime.oninput = updateViz4Controls;
    viz5SnapshotInterval.oninput = updateViz5Controls;
    viz5HistoryLifetime.oninput = updateViz5Controls;
    updateViz4Controls();
    updateViz5Controls();

    viz2Tone.onclick = () => {
        viz2Monochrome = !viz2Monochrome;
        viz2Tone.textContent = viz2Monochrome ? "モノクロ" : "カラー";
        viz2Tone.setAttribute("aria-pressed", viz2Monochrome);
    };

    viz3Tone.onclick = () => {
        viz3Monochrome = !viz3Monochrome;
        viz3Tone.textContent = viz3Monochrome ? "モノクロ" : "カラー";
        viz3Tone.setAttribute("aria-pressed", viz3Monochrome);
    };

    calibrate.onclick = async () => {
        if (activeMode === "video-file") {
            stopLoop();
            calibrate.disabled = true;
            try {
                await calibrateFromVideoStart();
                await seekVideo(0);
                processResults(faceLandmarker.detectForVideo(video, performance.now()));
                await video.play();
                startLoop();
            } catch (error) {
                calibrate.disabled = false;
                status.textContent = `動画キャリブレーション失敗: ${error.message}`;
            }
            return;
        }
        resetCalibration(WARMUP_FRAMES, CALIBRATION_FRAMES);
        showCalibrationGuide(GUIDE_MESSAGE);
        calibrate.disabled = true;
    };

    clearBaseline.onclick = () => {
        resetCalibration();
        hideCalibrationGuide();
        calibrate.disabled = false;
    };

    shuffleSpectrum.onclick = () => {
        spectrumOrder = shuffle(spectrumOrder);
    };

    cameraButton.onclick = () => startCamera().catch(report("カメラを開始できません"));

    fileInput.onchange = event => {
        importFile(event.target.files[0]).catch(report("ファイルを読み込めません"));
    };

    video.onplay = () => {
        if (activeMode === "video-file" && !calibratingVideoFile && !running) startLoop();
    };

    video.onpause = () => {
        if (activeMode === "video-file" && !calibratingVideoFile) stopLoop();
    };

    toggleShapes.onclick = () => {
        setShapesExpanded(shapesPanel.hidden);
    };

    paramSetSelect.onchange = () => {
        applyParamSet(paramSetSelect.value);
    };

    saveParamSet.onclick = async () => {
        await saveCurrentParamSet();
    };

    function setShapesExpanded(expanded) {
        shapesPanel.hidden = !expanded;
        toggleShapes.setAttribute("aria-expanded", expanded);
        toggleShapes.textContent = `${expanded ? "▲" : "▼"}`;
    }

    function toggleLayer(toggle, layer, control) {
        const active = toggle.checked;
        layer.hidden = !active;
        if (control) control.hidden = !active;
        if (!active) {
            if (visualize.hidden && visualize2.hidden && visualize3.hidden && visualize4.hidden && visualize5.hidden) hideCalibrationGuide();
            return;
        }

        setShapesExpanded(false);
        waitForFaceCalibration();
    }

    function startGuidedCalibration() {
        if (activeMode === "video-file") return;
        resetCalibration(WARMUP_FRAMES, CALIBRATION_FRAMES);
        showCalibrationGuide(GUIDE_MESSAGE);
        updateCalibrationPoint();
        calibrate.disabled = true;
    }

    function showCalibrationGuide(message) {
        calibrationGuideText.textContent = message;
        calibrationGuide.hidden = false;
    }

    function hideCalibrationGuide() {
        calibrationGuide.hidden = true;
        calibrationPoint.style.setProperty("--progress", 0);
    }

    function visualizing() {
        return !visualize.hidden || !visualize2.hidden || !visualize3.hidden || !visualize4.hidden || !visualize5.hidden;
    }

    function updateViz4Controls() {
        viz4SnapshotIntervalMs = Number(viz4SnapshotInterval.value);
        viz4HistoryLifetimeMs = Number(viz4HistoryLifetime.value);
        viz4SnapshotIntervalValue.value = `${viz4SnapshotIntervalMs}ms`;
        viz4HistoryLifetimeValue.value = `${(viz4HistoryLifetimeMs / 1000).toFixed(1)}s`;
    }

    function updateViz5Controls() {
        viz5SnapshotIntervalMs = Number(viz5SnapshotInterval.value);
        viz5HistoryLifetimeMs = Number(viz5HistoryLifetime.value);
        viz5SnapshotIntervalValue.value = `${viz5SnapshotIntervalMs}ms`;
        viz5HistoryLifetimeValue.value = `${(viz5HistoryLifetimeMs / 1000).toFixed(1)}s`;
    }

    function calibrationActive() {
        return calibration.warmup || calibration.remaining;
    }

    function waitForFaceCalibration() {
        if (activeMode === "video-file") return;
        resetCalibration();
        showCalibrationGuide(WAIT_MESSAGE);
    }

    function resetCalibration(warmup = 0, frames = 0) {
        [base, spectrum, spectrumSharpness, circles].forEach(map => map.clear());
        clearViz3CircleLayers();
        Object.assign(calibration, { warmup, remaining: frames, samples: 0 });
        calibration.stats.clear();
        status.textContent = "";
        updateCalibrationPoint();
    }

    async function startCamera() {
        stopLoop();
        stopCameraStream();
        clearImportedFile();
        video.srcObject = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: VW }, height: { ideal: VH }, aspectRatio: { ideal: 16 / 9 } }
        });
        await video.play();
        setActiveMode("camera");
        startLoop();
    }

    async function importFile(file) {
        if (!file) return;
        stopLoop();
        stopCameraStream();
        clearImportedFile();
        activeObjectUrl = URL.createObjectURL(file);

        if (file.type.startsWith("video/")) {
            await loadMedia(video, activeObjectUrl, "loadeddata");
            setActiveMode("video-file");
            video.pause();
            await seekVideo(0);
            await calibrateFromVideoStart();
            await seekVideo(0);
            processResults(faceLandmarker.detectForVideo(video, performance.now()));
            await video.play();
            startLoop();
            return;
        }

        clearImportedFile();
        status.textContent = "動画ファイルを選択してください";
    }

    function startLoop() {
        if (running) return;
        running = true;
        requestAnimationFrame(() => loop(++loopToken));
    }

    function stopLoop() {
        running = false;
        loopToken++;
    }

    function loop(token) {
        if (!running || token !== loopToken) return;
        processResults(faceLandmarker.detectForVideo(video, performance.now()));
        requestAnimationFrame(() => loop(token));
    }

    function processResults({ faceLandmarks, faceBlendshapes }) {
        const categories = faceBlendshapes[0]?.categories ?? [];
        updateAutoCalibration(categories.length > 0);
        drawLandmarks(faceLandmarks[0]);
        updateShapes(categories);

        const activeCategories = selectedCategories(categories);
        const spectrumVisible = !visualize.hidden || !visualize5.hidden;
        const motionVisible = !visualize2.hidden || !visualize3.hidden || !visualize4.hidden;

        if (spectrumVisible) {
            const spectrumFrame = updateSpectrumFrame(activeCategories);
            if (!visualize.hidden) drawSpectrum(spectrumFrame);
            if (!visualize5.hidden) drawSpectrumTimeline(spectrumFrame);
        }

        if (motionVisible) {
            const motionValues = updateMotionValues(activeCategories);
            if (!visualize2.hidden) drawMotionCircles(motionValues);
            if (!visualize3.hidden) drawMotionCircleLayers(motionValues);
            if (!visualize4.hidden) drawThreeWaveLine(motionValues);
        }
    }

    function updateAutoCalibration(faceDetected) {
        if (!visualizing() || activeMode === "video-file") return;

        if (!faceDetected) {
            if (base.size || calibrationActive()) waitForFaceCalibration();
        } else if (!base.size && !calibrationActive()) {
            startGuidedCalibration();
        }
    }

    function setActiveMode(mode) {
        activeMode = mode;
        stage.classList.toggle("file-source", mode !== "camera");
        video.hidden = false;
        video.controls = video.loop = mode === "video-file";
    }

    function stopCameraStream() {
        const stream = video.srcObject instanceof MediaStream ? video.srcObject : null;
        if (stream) stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }

    function clearImportedFile() {
        if (activeObjectUrl) URL.revokeObjectURL(activeObjectUrl);
        activeObjectUrl = "";
        video.removeAttribute("src");
        video.load();
        fileInput.value = "";
    }

    function loadMedia(media, src, eventName) {
        return new Promise((resolve, reject) => {
            const done = () => {
                media.removeEventListener(eventName, done);
                media.removeEventListener("error", fail);
                resolve();
            };
            const fail = () => {
                media.removeEventListener(eventName, done);
                media.removeEventListener("error", fail);
                reject(new Error("メディアを読み込めません"));
            };
            media.addEventListener(eventName, done, { once: true });
            media.addEventListener("error", fail, { once: true });
            media.src = src;
        });
    }

    function seekVideo(time) {
        return new Promise(resolve => {
            if (Math.abs(video.currentTime - time) < 0.001) {
                resolve();
                return;
            }
            video.addEventListener("seeked", resolve, { once: true });
            video.currentTime = time;
        });
    }

    function waitVideoFrame() {
        return new Promise(resolve => {
            let done = false;
            const finish = () => {
                if (done) return;
                done = true;
                resolve();
            };
            setTimeout(finish, 80);
            if ("requestVideoFrameCallback" in video) {
                video.requestVideoFrameCallback(finish);
                return;
            }
            requestAnimationFrame(finish);
        });
    }

    function updateShapes(categories) {
        updateCalibration(categories);

        for (const { categoryName, score } of categories) {
            if (!shapes.has(categoryName)) {
                const row = document.createElement("div");
                const label = document.createElement("label");
                const input = document.createElement("input");
                const name = document.createElement("span");
                const bar = document.createElement("span");
                const fill = document.createElement("span");
                const value = document.createElement("span");

                row.className = "shape";
                label.className = "param";
                label.title = categoryName;
                input.type = "checkbox";
                input.checked = savedParamEnabled(categoryName);
                name.textContent = categoryName;
                bar.className = "bar raw";
                fill.className = "fill";
                value.className = "value";
                input.onchange = () => {
                    setParamEnabled(categoryName, input.checked);
                };

                setParamEnabled(categoryName, input.checked);
                label.append(input, name);
                bar.append(fill);
                row.append(label, bar, value);
                shapesPanel.appendChild(row);
                shapes.set(categoryName, { input, bar, value });
            }
            const { bar, value } = shapes.get(categoryName);
            const calibrated = base.size > 0;
            const displayScore = calibrated ? calibratedScore(categoryName, score) : score;
            const width = calibrated
                ? Math.min(Math.abs(displayScore) * 100, 50)
                : Math.min(score * 100, 100);
            bar.className = `bar ${calibrated ? (displayScore < 0 ? "negative" : "positive") : "raw"}`;
            bar.style.setProperty("--v", `${width}%`);
            value.textContent = calibrated ? signed(displayScore) : score.toFixed(4);
        }
    }

    function selectedCategories(categories) {
        return categories.filter(({ categoryName }) => enabledParams.has(categoryName));
    }

    function setParamEnabled(categoryName, enabled) {
        if (enabled) {
            enabledParams.add(categoryName);
            return;
        }

        enabledParams.delete(categoryName);
        [spectrum, spectrumSharpness, circles].forEach(map => map.delete(categoryName));
    }

    function savedParamEnabled(categoryName) {
        const paramSet = paramSets[activeParamSetName];
        return paramSet && categoryName in paramSet ? Boolean(paramSet[categoryName]) : true;
    }

    async function loadParamSets() {
        try {
            const sets = {};

            for (let index = 1; index <= 99; index++) {
                const name = datasetName(index);
                const response = await fetch(`${PARAM_SET_DIR}/${name}`, { cache: "no-store" });
                if (response.status === 404) break;
                if (!response.ok) throw new Error(`${name}: HTTP ${response.status}`);

                const text = await response.text();
                if (!text.trim()) continue;

                const stored = JSON.parse(text);
                const paramSet = stored?.[name] ?? stored;
                if (validParamSet(paramSet)) sets[name] = paramSet;
            }

            return sets;
        } catch (error) {
            status.textContent = `parameterを読み込めません: ${error.message}`;
            return {};
        }
    }

    function validParamSet(value) {
        return value && typeof value === "object" && !Array.isArray(value);
    }

    function renderParamSetOptions(selectedName = activeParamSetName) {
        const names = Object.keys(paramSets).sort((a, b) => a.localeCompare(b, "ja", { numeric: true }));
        paramSetSelect.replaceChildren(new Option("セットなし", ""));

        for (const name of names) {
            paramSetSelect.appendChild(new Option(name, name));
        }

        activeParamSetName = names.includes(selectedName) ? selectedName : "";
        paramSetSelect.value = activeParamSetName;
    }

    async function saveCurrentParamSet() {
        if (!shapes.size) {
            status.textContent = "保存できるパラメーターがありません";
            return;
        }

        const name = nextParamSetName();
        const paramSet = Object.fromEntries([...shapes].map(([categoryName, { input }]) => [categoryName, input.checked]));
        paramSets[name] = paramSet;

        try {
            await writeParamSetFile(JSON.stringify(paramSet, null, 2), name);
            renderParamSetOptions(name);
            status.textContent = `${name} を書き出しました`;
        } catch (error) {
            delete paramSets[name];
            status.textContent = `保存できません: ${error.message}`;
        }
    }

    async function writeParamSetFile(json, name) {
        const blob = new Blob([json], { type: "application/json" });

        if ("showSaveFilePicker" in window) {
            const handle = await window.showSaveFilePicker({ suggestedName: name });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
        }

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = name;
        link.click();
        setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function nextParamSetName() {
        let index = Object.keys(paramSets).length + 1;
        let name = "";

        do {
            name = datasetName(index++);
        } while (name in paramSets);

        return name;
    }

    function datasetName(index) {
        return `dataset${String(index).padStart(2, "0")}`;
    }

    function applyParamSet(name) {
        activeParamSetName = name;
        const paramSet = paramSets[name];

        for (const [categoryName, { input }] of shapes) {
            input.checked = paramSet && categoryName in paramSet ? Boolean(paramSet[categoryName]) : true;
            setParamEnabled(categoryName, input.checked);
        }

        status.textContent = name ? `${name} を読み込みました` : "";
    }

    function updateCalibration(categories) {
        if ((!calibration.warmup && !calibration.remaining) || !categories.length) return;

        if (calibration.warmup) {
            status.textContent = `準備中 ${--calibration.warmup}`;
            updateCalibrationPoint();
            return;
        }

        for (const { categoryName, score } of categories) {
            const stat = calibration.stats.get(categoryName) ?? { sum: 0, sq: 0 };
            stat.sum += score;
            stat.sq += score * score;
            calibration.stats.set(categoryName, stat);
        }

        calibration.samples++;
        status.textContent = `キャリブレーション中 ${--calibration.remaining}`;
        updateCalibrationPoint();

        if (calibration.remaining) return;

        base.clear();
        for (const [categoryName, { sum, sq }] of calibration.stats) {
            const mean = sum / calibration.samples;
            const variance = Math.max(sq / calibration.samples - mean * mean, 0);
            base.set(categoryName, { mean, dead: Math.max(Math.sqrt(variance) * 3, DEADZONE) });
        }
        calibrate.disabled = false;
        hideCalibrationGuide();
        status.textContent = `キャリブ済み (${calibration.samples} frames)`;
    }

    function updateCalibrationPoint() {
        const progress = !calibrationActive() || calibration.warmup
            ? 0
            : clamp((CALIBRATION_FRAMES - calibration.remaining) / CALIBRATION_FRAMES * 100, 0, 100);
        calibrationPoint.style.setProperty("--progress", progress);
    }

    async function calibrateFromVideoStart() {
        const duration = Math.min(VIDEO_BASELINE_SECONDS, video.duration || VIDEO_BASELINE_SECONDS);
        const samplesByName = new Map();
        let sampleCount = 0;

        calibratingVideoFile = true;
        try {
            for (let pass = 0; pass < VIDEO_BASELINE_PASSES; pass++) {
                status.textContent = `動画キャリブレーション中 ${pass + 1}/${VIDEO_BASELINE_PASSES}`;
                await seekVideo(0);
                await video.play();
                while (video.currentTime < duration) {
                    await waitVideoFrame();
                    const categories = faceLandmarker.detectForVideo(video, performance.now()).faceBlendshapes[0]?.categories ?? [];
                    if (!categories.length) continue;
                    sampleCount++;
                    for (const { categoryName, score } of categories) {
                        const values = samplesByName.get(categoryName) ?? [];
                        values.push(score);
                        samplesByName.set(categoryName, values);
                    }
                }
                video.pause();
            }
        } finally {
            video.pause();
            calibratingVideoFile = false;
        }

        if (!sampleCount) {
            status.textContent = `最初の${VIDEO_BASELINE_SECONDS}秒x${VIDEO_BASELINE_PASSES}回で顔を検出できません`;
            return;
        }

        base.clear();
        calibration.stats.clear();
        Object.assign(calibration, { warmup: 0, remaining: 0, samples: sampleCount });
        for (const [categoryName, values] of samplesByName) {
            const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
            const min = Math.min(...values);
            const max = Math.max(...values);
            const dead = Math.max((max - min) * 0.1, DEADZONE);
            base.set(categoryName, { mean, min, max, dead });
        }
        calibrate.disabled = false;
        hideCalibrationGuide();
        status.textContent = `キャリブ済み (${VIDEO_BASELINE_SECONDS * VIDEO_BASELINE_PASSES}s)`;
    }

    function calibratedScore(categoryName, score) {
        const { mean = 0, dead = 0, min = mean - dead, max = mean + dead } = base.get(categoryName) ?? {};
        if (score >= min - dead && score <= max + dead) return 0;
        return score < mean ? score - (min - dead) : score - (max + dead);
    }

    function signed(value) {
        return `${value >= 0 ? "+" : ""}${value.toFixed(4)}`;
    }

    function updateSpectrumFrame(categories) {
        const { width, height } = vizCanvas;
        if (!categories.length) {
            spectrumHistory = [];
            spectrumLastSnapshotAt = 0;
            return { active: false, points: [] };
        }

        const [cx, cy] = [width / 2, height / 2];
        const baseRadius = Math.min(width, height) * 0.28;
        const maxSpike = Math.min(width, height) * 0.18;
        const calibrated = base.size > 0;
        const ordered = orderedSpectrumCategories(categories);
        const points = ordered.map(({ categoryName, score }, i) => {
            const rawValue = calibrated ? calibratedScore(categoryName, score) : 0;
            const value = Math.abs(rawValue) < SPECTRUM_ZERO_THRESHOLD ? 0 : rawValue;
            const previous = spectrum.get(categoryName) ?? 0;
            const smoothed = previous * 0.82 + value * 0.18;
            const rawSpeed = Math.max(Math.abs(smoothed - previous) - 0.002, 0);
            const previousSharpness = spectrumSharpness.get(categoryName) ?? 0;
            const changeSharpness = Math.min(rawSpeed * 180, 1);
            const sharpness = value === 0 ? previousSharpness * 0.82 : Math.max(previousSharpness, changeSharpness);
            spectrum.set(categoryName, smoothed);
            spectrumSharpness.set(categoryName, sharpness);
            const angle = i / ordered.length * Math.PI * 2 - Math.PI / 2;
            const radius = baseRadius + Math.max(-1, Math.min(smoothed * 18, 1)) * maxSpike;
            return {
                x: cx + Math.cos(angle) * radius,
                y: cy + Math.sin(angle) * radius,
                sharpness
            };
        });

        return { active: calibrated, points };
    }

    function drawSpectrum({ active, points }) {
        const { width, height } = vizCanvas;
        vizCtx.clearRect(0, 0, width, height);
        drawSpectrumPath(vizCtx, points, active);
    }

    function drawSpectrumTimeline({ active, points }) {
        const { width, height } = vizCanvas5;
        vizCtx5.clearRect(0, 0, width, height);
        if (!points.length) return;

        updateSpectrumHistory(points, active);
        drawSpectrumHistory(width, height);
    }

    function updateSpectrumHistory(points, active) {
        const now = performance.now();

        if (spectrumHistory[0]?.points.length !== points.length) {
            spectrumHistory = [];
            spectrumLastSnapshotAt = 0;
        }
        if (!spectrumLastSnapshotAt || now - spectrumLastSnapshotAt >= viz5SnapshotIntervalMs) {
            spectrumHistory.unshift({
                points: points.map(point => ({ ...point })),
                active,
                createdAt: now
            });
            spectrumLastSnapshotAt = now;
        }
        spectrumHistory = spectrumHistory.filter(({ createdAt }) => now - createdAt <= viz5HistoryLifetimeMs);
    }

    function drawSpectrumHistory(width, height) {
        const now = performance.now();

        for (let i = spectrumHistory.length - 1; i >= 0; i--) {
            const { points, active, createdAt } = spectrumHistory[i];
            const age = clamp((now - createdAt) / viz5HistoryLifetimeMs, 0, 1);
            const scale = 0.82 * (1 - age * 0.18);
            const dx = age * width * 0.16;
            const dy = -age * height * 0.22;

            vizCtx5.save();
            vizCtx5.globalAlpha = 1 - age * 0.72;
            vizCtx5.translate(width / 2 + dx, height / 2 + dy);
            vizCtx5.scale(scale, scale);
            vizCtx5.translate(-width / 2, -height / 2);
            drawSpectrumPath(vizCtx5, points, active);
            vizCtx5.restore();
        }
    }

    function orderedSpectrumCategories(categories) {
        const byName = new Map(categories.map(category => [category.categoryName, category]));
        const known = spectrumOrder.filter(categoryName => byName.has(categoryName));
        const added = categories
            .map(({ categoryName }) => categoryName)
            .filter(categoryName => !known.includes(categoryName));
        spectrumOrder = known.length ? [...known, ...shuffle(added)] : shuffle(categories.map(({ categoryName }) => categoryName));
        return spectrumOrder.map(categoryName => byName.get(categoryName)).filter(Boolean);
    }

    function shuffle(items) {
        const shuffled = [...items];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function drawSpectrumPath(targetCtx, points, active) {
        if (points.length < 3) return;

        targetCtx.save();
        targetCtx.lineWidth = 3;
        targetCtx.lineJoin = "miter";
        targetCtx.miterLimit = 2.5;
        targetCtx.lineCap = "round";
        targetCtx.strokeStyle = active ? "#999" : "#bbb";
        targetCtx.beginPath();

        const start = midpoint(points[points.length - 1], points[0]);
        targetCtx.moveTo(start.x, start.y);

        for (let i = 0; i < points.length; i++) {
            const previous = points[(i - 1 + points.length) % points.length];
            const current = points[i];
            const next = points[(i + 1) % points.length];
            const previousMid = midpoint(previous, current);
            const nextMid = midpoint(current, next);
            const sharpness = current.sharpness ?? 0;

            if (sharpness > 0.85) {
                targetCtx.lineTo(current.x, current.y);
                targetCtx.lineTo(nextMid.x, nextMid.y);
            } else if (sharpness > 0.08) {
                const corner = 0.45 + sharpness * 0.5;
                const entry = lerpPoint(previousMid, current, corner);
                const exit = lerpPoint(nextMid, current, corner);
                targetCtx.quadraticCurveTo(current.x, current.y, entry.x, entry.y);
                targetCtx.lineTo(current.x, current.y);
                targetCtx.lineTo(exit.x, exit.y);
                targetCtx.quadraticCurveTo(current.x, current.y, nextMid.x, nextMid.y);
            } else {
                targetCtx.quadraticCurveTo(current.x, current.y, nextMid.x, nextMid.y);
            }
        }

        targetCtx.closePath();
        targetCtx.stroke();
        targetCtx.restore();
    }

    function updateMotionValues(categories) {
        const calibrated = base.size > 0;
        const values = categories.map(({ categoryName, score }) => {
            const target = calibrated ? calibratedScore(categoryName, score) : 0;
            const state = circles.get(categoryName) ?? { value: 0, speed: 0, phase: Math.random() * Math.PI * 2 };
            const previous = state.value;
            state.value = previous * 0.78 + target * 0.22;
            state.speed = state.speed * 0.72 + Math.abs(state.value - previous) * 0.28;
            state.phase += 0.02 + Math.abs(state.value) * 0.16;
            circles.set(categoryName, state);
            return { ...state, categoryName, amount: Math.abs(state.value) };
        });

        return { calibrated, values, maxAmount: Math.max(...values.map(({ amount }) => amount), calibrated ? 0.08 : 0.25) };
    }

    function drawMotionCircles({ calibrated, values, maxAmount }) {
        const { width, height } = vizCanvas2;
        vizCtx2.clearRect(0, 0, width, height);
        if (!values.length) return;

        const [cx, cy] = [width / 2, height / 2];
        const minStage = Math.min(width, height);

        vizCtx2.save();
        vizCtx2.lineWidth = 1.8;
        vizCtx2.lineCap = "round";
        vizCtx2.lineJoin = "round";

        values.forEach(({ value, speed, phase, amount }, i) => {
            const normalized = clamp(amount / maxAmount, 0, 1);
            const radius = minStage * (0.12 + normalized * 0.28);
            const amplitude = minStage * normalized * 0.08;
            const sharpness = clamp(speed * (calibrated ? 220 : 42), 0, 1) ** 0.65;
            const waves = Math.round(3 + normalized * 10);
            const hue = (i * 41 + 165) % 360;
            const alpha = 0.36 + normalized * 0.55;

            [vizCtx2.strokeStyle, vizCtx2.fillStyle] = viz2Monochrome
                ? [`rgba(40, 40, 40, ${alpha})`, `rgba(40, 40, 40, ${0.025 + normalized * 0.075})`]
                : [`hsla(${hue}, 55%, ${value >= 0 ? 42 : 55}%, ${alpha})`, `hsla(${hue}, 62%, 58%, ${0.035 + normalized * 0.09})`];
            drawWavyCircle(cx, cy, radius, amplitude, waves, phase, sharpness);
        });

        vizCtx2.restore();
    }

    function setupViz3() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(42, vizCanvas3.width / vizCanvas3.height, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ canvas: vizCanvas3, alpha: true, antialias: true });
        const group = new THREE.Group();

        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(vizCanvas3.width, vizCanvas3.height, false);
        renderer.setClearColor(0xf0f0f0, 0);
        camera.position.set(-4, 1, 4);
        camera.lookAt(0, 0, 0);

        scene.add(group);

        return { scene, camera, renderer, group };
    }

    function setupViz4() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(38, vizCanvas4.width / vizCanvas4.height, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ canvas: vizCanvas4, alpha: true, antialias: true });
        const group = new THREE.Group();
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x167e70, transparent: true, opacity: 0.92 });
        const ridge = new THREE.Line(new THREE.BufferGeometry(), lineMaterial);
        const trail = new THREE.LineSegments(new THREE.BufferGeometry(), lineMaterial);
        const grid = new THREE.LineSegments(
            createViz4GridGeometry(),
            new THREE.LineBasicMaterial({ color: 0x45484f, transparent: true, opacity: 0.18 })
        );

        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(vizCanvas4.width, vizCanvas4.height, false);
        renderer.setClearColor(0xf0f0f0, 0);
        camera.position.set(3.6, 3.1, 4.8);
        camera.lookAt(0, 0.6, 0);
        group.rotation.set(-0.04, -0.58, 0.02);
        group.add(grid, trail, ridge);
        scene.add(group);

        return { scene, camera, renderer, ridge, trail };
    }

    function createViz4GridGeometry() {
        const points = [];
        const leftX = VIZ4_WIDTH / 2;
        const rightX = -VIZ4_WIDTH / 2;
        const frontZ = -VIZ4_DEPTH / 2;
        const backZ = VIZ4_DEPTH / 2;

        for (let row = 0; row < VIZ4_ROWS; row++) {
            const z = frontZ + (VIZ4_DEPTH * row) / (VIZ4_ROWS - 1);
            points.push(new THREE.Vector3(leftX, VIZ4_BASE_Y, z), new THREE.Vector3(rightX, VIZ4_BASE_Y, z));
        }
        for (let i = 0; i < VIZ4_COLUMNS; i++) {
            const x = leftX + ((rightX - leftX) * i) / (VIZ4_COLUMNS - 1);
            points.push(new THREE.Vector3(x, VIZ4_BASE_Y, frontZ), new THREE.Vector3(x, VIZ4_BASE_Y, backZ));
        }

        return new THREE.BufferGeometry().setFromPoints(points);
    }

    function drawThreeWaveLine({ values, maxAmount }) {
        if (!values.length) {
            viz4History = [];
            viz4LastSnapshotAt = 0;
            viz4.renderer.clear();
            return;
        }

        const now = performance.now();
        const currentValues = values.map(({ amount }) => clamp(amount / maxAmount, 0, 1));
        const ridgePoints = [];
        const trailPoints = [];
        const lastIndex = Math.max(values.length - 1, 1);
        const backZ = VIZ4_DEPTH / 2;

        if (viz4History[0]?.values.length !== currentValues.length) {
            viz4History = [];
            viz4LastSnapshotAt = 0;
        }
        if (!viz4LastSnapshotAt || now - viz4LastSnapshotAt >= viz4SnapshotIntervalMs) {
            viz4History.unshift({
                values: currentValues,
                createdAt: now
            });
            viz4LastSnapshotAt = now;
        }
        viz4History = viz4History.filter(({ createdAt }) => now - createdAt <= viz4HistoryLifetimeMs);

        viz4History.forEach(({ values: historyValues, createdAt }, historyIndex) => {
            const rowT = clamp((now - createdAt) / viz4HistoryLifetimeMs, 0, 1);
            const z = backZ - VIZ4_DEPTH * rowT;
            const points = historyValues.map((normalizedValue, i) => {
                const t = i / lastIndex;
                const x = (0.5 - t) * VIZ4_WIDTH;
                const y = VIZ4_BASE_Y + normalizedValue * VIZ4_HEIGHT;
                return new THREE.Vector3(x, y, z);
            });

            if (historyIndex === 0) {
                ridgePoints.push(...points);
            } else {
                for (let i = 0; i < points.length - 1; i++) {
                    trailPoints.push(points[i], points[i + 1]);
                }
            }
        });

        viz4.ridge.geometry.dispose();
        viz4.ridge.geometry = new THREE.BufferGeometry().setFromPoints(ridgePoints);
        viz4.trail.geometry.dispose();
        viz4.trail.geometry = new THREE.BufferGeometry().setFromPoints(trailPoints);
        viz4.renderer.render(viz4.scene, viz4.camera);
    }

    function drawMotionCircleLayers({ calibrated, values, maxAmount }) {
        if (!values.length) {
            clearViz3CircleLayers();
            viz3.renderer.clear();
            return;
        }

        const activeNames = new Set(values.map(({ categoryName }) => categoryName));
        for (const [categoryName, shell] of circleLayers) {
            if (!activeNames.has(categoryName)) {
                viz3.group.remove(shell);
                disposeViz3Object(shell);
                circleLayers.delete(categoryName);
            }
        }

        const baseRadius = 0.34;
        const layerGap = 0.055;
        const centerOffset = (values.length - 1) * layerGap * 0.5;

        values.forEach(({ categoryName, value, speed, phase, amount }, i) => {
            const normalized = clamp(amount / maxAmount, 0, 1);
            const radius = baseRadius + normalized * 0.82;
            const amplitude = normalized * 0.12;
            const waves = Math.round(3 + normalized * 10);
            const targetDepth = i * layerGap - centerOffset;
            const sharpness = clamp(speed * (calibrated ? 220 : 42), 0, 1) ** 0.65;
            const hue = (i * 41 + 165) % 360;
            const color = viz3Monochrome
                ? new THREE.Color(0.18, 0.18, 0.18)
                : new THREE.Color(`hsl(${hue}, 58%, ${value >= 0 ? 42 : 55}%)`);
            let shell = circleLayers.get(categoryName);

            if (!shell) {
                shell = new THREE.Group();
                const fillMaterial = new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.16,
                    side: THREE.DoubleSide
                });
                const lineMaterial = new THREE.LineBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.78
                });
                const fill = new THREE.Mesh(
                    createWavyCircleFillGeometry(radius, amplitude, waves, phase, sharpness),
                    fillMaterial
                );
                const line = new THREE.LineLoop(
                    createWavyCircleLineGeometry(radius, amplitude, waves, phase, sharpness),
                    lineMaterial
                );

                shell.add(fill, line);
                shell.userData = { depth: targetDepth, fill, line };
                viz3.group.add(shell);
                circleLayers.set(categoryName, shell);
            }

            shell.userData.fill.geometry.dispose();
            shell.userData.line.geometry.dispose();
            shell.userData.fill.geometry = createWavyCircleFillGeometry(radius, amplitude, waves, phase, sharpness);
            shell.userData.line.geometry = createWavyCircleLineGeometry(radius, amplitude, waves, phase, sharpness);
            shell.userData.depth = shell.userData.depth * 0.82 + targetDepth * 0.18;
            shell.position.x = shell.userData.depth;
            shell.scale.setScalar(1 + sharpness * 0.02);
            shell.userData.fill.material.color.copy(color);
            shell.userData.line.material.color.copy(color);
            shell.userData.fill.material.opacity = 0.06 + normalized * 0.17;
            shell.userData.line.material.opacity = 0.42 + normalized * 0.42;
        });

        viz3.renderer.render(viz3.scene, viz3.camera);
    }

    function createWavyCircleFillGeometry(radius, amplitude, waves, phase, sharpness) {
        const radialSegments = 72;
        const positions = [0, 0, 0];
        const indices = [];

        for (let i = 0; i < radialSegments; i++) {
            const angle = i / radialSegments * Math.PI * 2;
            const wave = shapedWave(angle * waves + phase, sharpness);
            const r = radius + wave * amplitude;
            positions.push(0, Math.cos(angle) * r, Math.sin(angle) * r);
        }

        for (let i = 1; i <= radialSegments; i++) {
            indices.push(0, i, i === radialSegments ? 1 : i + 1);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geometry.setIndex(indices);
        return geometry;
    }

    function createWavyCircleLineGeometry(radius, amplitude, waves, phase, sharpness) {
        const radialSegments = 96;
        const points = [];

        for (let i = 0; i < radialSegments; i++) {
            const angle = i / radialSegments * Math.PI * 2;
            const wave = shapedWave(angle * waves + phase, sharpness);
            const r = radius + wave * amplitude;
            points.push(new THREE.Vector3(0, Math.cos(angle) * r, Math.sin(angle) * r));
        }

        return new THREE.BufferGeometry().setFromPoints(points);
    }

    function clearViz3CircleLayers() {
        for (const shell of circleLayers.values()) {
            viz3.group.remove(shell);
            disposeViz3Object(shell);
        }
        circleLayers.clear();
        viz3.renderer.clear();
    }

    function disposeViz3Object(object) {
        object.traverse(child => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
        });
    }

    function drawWavyCircle(cx, cy, radius, amplitude, waves, phase, sharpness) {
        const steps = 96;
        vizCtx2.beginPath();

        for (let i = 0; i <= steps; i++) {
            const angle = i / steps * Math.PI * 2;
            const wave = shapedWave(angle * waves + phase, sharpness);
            const r = radius + wave * amplitude;
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            if (i === 0) {
                vizCtx2.moveTo(x, y);
            } else {
                vizCtx2.lineTo(x, y);
            }
        }

        vizCtx2.closePath();
        vizCtx2.fill();
        vizCtx2.stroke();
    }

    function shapedWave(angle, sharpness) {
        const wrapped = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        const triangle = 1 - Math.abs(wrapped / Math.PI - 1);
        const pointed = Math.pow(triangle, 1 + sharpness * 8) * 2 - 1;
        const smooth = Math.cos(angle);
        return smooth * (1 - sharpness) + pointed * sharpness;
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(value, max));
    }

    function midpoint(a, b) {
        return {
            x: (a.x + b.x) / 2,
            y: (a.y + b.y) / 2
        };
    }

    function lerpPoint(a, b, t) {
        return {
            x: a.x + (b.x - a.x) * t,
            y: a.y + (b.y - a.y) * t
        };
    }

    function drawLandmarks(landmarks = []) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const [sw, sh] = [
            video.videoWidth || VW,
            video.videoHeight || VH
        ];
        const scale = Math.max(canvas.width / sw, canvas.height / sh);
        const [dx, dy] = [(canvas.width - sw * scale) / 2, (canvas.height - sh * scale) / 2];

        ctx.fillStyle = "green";
        ctx.beginPath();
        for (const p of landmarks) {
            const [x, y] = [p.x * sw * scale + dx, p.y * sh * scale + dy];
            ctx.moveTo(x, y);
            ctx.arc(x, y, 1.2, 0, Math.PI * 2);
        }
        ctx.fill();
    }
</script>
