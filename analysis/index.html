<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis</title>
    <script defer src="../faceAPI/face-api.min.js"></script>
    <style>
        body {
            margin: 16px;
            display: grid;
            place-items: start center;
            font-family: sans-serif;
        }

        main {
            width: min(90vw, 720px);
        }

        video,
        canvas {
            width: 100%;
            display: block;
            margin: 12px 0;
        }

        canvas {
            height: 240px;
            background: #f4f4f4;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        .score {
            margin: 6px 0;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>

<body>
    <main>
        <video id="video" controls playsinline muted></video>
        <input id="file" type="file" accept="video/*">
        <canvas id="chart"></canvas>
        <div class="actions">
            <button id="download" type="button" disabled>download</button>
        </div>
        <div id="scores"></div>
    </main>

    <script>
        window.addEventListener("load", async () => {
            const $ = (id) => document.getElementById(id);
            const MODEL_URL = "../faceAPI/models";
            const colors = {
                neutral: "#666",
                happy: "#e6b800",
                sad: "#3366ff",
                angry: "#e53935",
                fearful: "#8e44ad",
                disgusted: "#43a047",
                surprised: "#fb8c00"
            };
            const names = Object.keys(colors);
            const [file, video, chart, download, scores] = ["file", "video", "chart", "download", "scores"].map($);
            const ctx = chart.getContext("2d");
            const options = new faceapi.TinyFaceDetectorOptions();
            const history = [];
            let objectUrl;
            let timer;

            scores.innerHTML = names.map((name) =>
                `<div class="score" style="color:${colors[name]}">${name}: <span id="${name}Score">0.0000</span></div>`
            ).join("");

            const updateScores = (expressions) => names.forEach((name) => {
                $(`${name}Score`).textContent = (expressions[name] || 0).toFixed(4);
            });

            const draw = (data = history, dpr = window.devicePixelRatio || 1) => {
                const { width, height } = chart.getBoundingClientRect();
                chart.width = width * dpr;
                chart.height = height * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, width, height);
                ctx.font = "12px sans-serif";
                ctx.lineWidth = 1;

                for (let y = 0; y <= 1; y += 0.25) {
                    const py = height - y * height;
                    ctx.strokeStyle = "#ddd";
                    ctx.beginPath();
                    ctx.moveTo(0, py);
                    ctx.lineTo(width, py);
                    ctx.stroke();
                    ctx.fillStyle = "#666";
                    ctx.fillText(y.toFixed(2), 4, py - 4);
                }

                const first = data[0]?.time || 0;
                const last = data.at(-1)?.time || 0;
                for (let i = 0; i <= 4; i++) {
                    const x = i * width / 4;
                    ctx.strokeStyle = "#ddd";
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                    if (i) ctx.fillText(`${(first + (last - first) * i / 4).toFixed(1)}s`, x + 4, height - 6);
                }

                names.forEach((name) => {
                    ctx.strokeStyle = colors[name];
                    ctx.beginPath();
                    data.forEach(({ expressions }, i) => {
                        const x = data.length < 2 ? 0 : i * width / (data.length - 1);
                        const y = height - expressions[name] * height;
                        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
                    });
                    ctx.stroke();
                });
            };

            const seek = (time) => new Promise((resolve) => {
                const target = Math.max(0, Math.min(time, video.duration - 0.01));
                if (Math.abs(video.currentTime - target) < 0.001 && video.readyState >= 2) {
                    requestAnimationFrame(resolve);
                    return;
                }
                video.addEventListener("seeked", resolve, { once: true });
                video.currentTime = target;
            });

            const saveChart = (name) => {
                const a = document.createElement("a");
                a.href = chart.toDataURL("image/png");
                a.download = name;
                a.click();
            };

            file.addEventListener("change", async () => {
                if (!file.files[0]) return;
                if (objectUrl) URL.revokeObjectURL(objectUrl);
                objectUrl = URL.createObjectURL(file.files[0]);
                video.src = objectUrl;
                history.length = 0;
                updateScores({});
                draw();
                download.disabled = true;
            });

            video.addEventListener("loadedmetadata", () => {
                download.disabled = false;
            });

            download.addEventListener("click", async () => {
                if (!Number.isFinite(video.duration)) return;
                clearInterval(timer);
                video.pause();
                download.disabled = true;

                const currentTime = video.currentTime;
                const minutes = Math.ceil(video.duration / 60);
                for (let minute = 0; minute < minutes; minute++) {
                    download.textContent = `${minute + 1}/${minutes}`;
                    const data = [];
                    const start = minute * 60;
                    const end = Math.min(start + 60, video.duration);
                    for (let time = start; time < end; time += 1) {
                        await seek(time);
                        const detection = await faceapi.detectSingleFace(video, options).withFaceExpressions();
                        if (detection) data.push({ time, expressions: detection.expressions });
                    }
                    draw(data, 3);
                    saveChart(`chart_${String(minute + 1).padStart(3, "0")}.png`);
                }

                await seek(currentTime);
                draw();
                download.disabled = false;
                download.textContent = "download";
            });

            video.addEventListener("play", () => {
                clearInterval(timer);
                timer = setInterval(async () => {
                    if (video.readyState < 2) return;
                    const detection = await faceapi.detectSingleFace(video, options).withFaceExpressions();
                    if (!detection) return;
                    history.push({ time: video.currentTime, expressions: detection.expressions });
                    if (history.length > 120) history.shift();
                    updateScores(detection.expressions);
                    draw();
                }, 200);
            });
            ["pause", "ended"].forEach((event) => video.addEventListener(event, () => clearInterval(timer)));
            window.addEventListener("resize", draw);

            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
            ]);
            draw();
        });
    </script>
</body>

</html>
